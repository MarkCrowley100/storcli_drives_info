<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StorCLI Drive Info</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --green: #3ecf8e;
    --yellow: #f5c842;
    --red: #f56565;
    --text: #e2e8f0;
    --muted: #718096;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
  header p { color: var(--muted); font-size: 13px; }

  .toolbar { padding: 12px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
  button { cursor: pointer; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 500; }
  #refreshBtn { background: var(--accent); color: #fff; }
  #refreshBtn:hover { background: #3a7aed; }
  #refreshBtn:disabled { background: var(--surface2); color: var(--muted); cursor: default; }
  .view-toggle button { background: var(--surface2); color: var(--muted); }
  .view-toggle button.active { background: var(--accent); color: #fff; }
  #status { font-size: 12px; color: var(--muted); margin-left: auto; }

  main { padding: 20px 24px; }

  /* ── Server cards (overview) ── */
  #overview { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .server-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .server-card .card-header { background: var(--surface2); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .server-card .card-header h3 { font-size: 14px; font-weight: 600; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-ok { background: #1a3a2a; color: var(--green); }
  .badge-err { background: #3a1a1a; color: var(--red); }
  .badge-loading { background: #2a2a1a; color: var(--yellow); }
  .server-card table { width: 100%; border-collapse: collapse; }
  .server-card td { padding: 6px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .server-card td:first-child { color: var(--muted); width: 45%; }
  .server-card td:last-child { font-weight: 500; word-break: break-word; }
  .drive-list { padding: 8px 14px; }
  .drive-list .drive-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .drive-list .drive-row:last-child { border-bottom: none; }
  .err-msg { color: var(--red); padding: 10px 14px; font-size: 12px; word-break: break-all; }

  /* ── Compare table ── */
  #compare { overflow-x: auto; }
  .compare-table { border-collapse: collapse; min-width: 100%; }
  .compare-table th, .compare-table td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; font-size: 12px; white-space: nowrap; }
  .compare-table th { background: var(--surface2); color: var(--accent); font-weight: 600; position: sticky; top: 0; }
  .compare-table tr:nth-child(even) td { background: var(--surface); }
  .compare-table tr:nth-child(odd) td { background: var(--bg); }
  .compare-table td.row-label { background: var(--surface2); color: var(--muted); font-weight: 500; position: sticky; left: 0; }
  .compare-table td.diff { background: #2a1f0a; color: var(--yellow); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Drive detail view ── */
  #detail { display: none; }
  #detail.active { display: block; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .detail-card h4 { background: var(--surface2); padding: 8px 14px; font-size: 13px; color: var(--accent); }
  .detail-card table { width: 100%; border-collapse: collapse; }
  .detail-card td { padding: 5px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .detail-card td:first-child { color: var(--muted); width: 50%; }

  .section-header { font-size: 15px; font-weight: 600; margin: 20px 0 10px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>StorCLI Drive Monitor</h1>
    <p>Remote drive health across Windows servers</p>
  </div>
</header>

<div class="toolbar">
  <button id="refreshBtn" onclick="loadData()">&#8635; Refresh All</button>
  <div class="view-toggle">
    <button id="btnOverview" class="active" onclick="setView('overview')">Overview</button>
    <button id="btnCompare" onclick="setView('compare')">Compare</button>
    <button id="btnDetail" onclick="setView('detail')">Drive Detail</button>
  </div>
  <span id="status"></span>
</div>

<main>
  <div id="overview"></div>
  <div id="compare" style="display:none"></div>
  <div id="detail" style="display:none"></div>
</main>

<script>
const SERVERS = {{ servers | tojson }};
let currentData = {};
let currentView = 'overview';

// ── Utility ──────────────────────────────────────────────────────────────────

function setStatus(msg, loading=false) {
  const el = document.getElementById('status');
  el.innerHTML = loading ? `<span class="spinner"></span>${msg}` : msg;
}

function setView(v) {
  currentView = v;
  ['overview','compare','detail'].forEach(id => {
    document.getElementById(id).style.display = id === v ? 'block' : 'none';
  });
  ['btnOverview','btnCompare','btnDetail'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === 'btn' + v.charAt(0).toUpperCase() + v.slice(1));
  });
  if (Object.keys(currentData).length) render();
}

// ── Data fetch ────────────────────────────────────────────────────────────────

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  setStatus('Fetching from all servers…', true);
  try {
    const res = await fetch('/api/data');
    currentData = await res.json();
    render();
    setStatus('Updated ' + new Date().toLocaleTimeString());
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
  btn.disabled = false;
}

// ── Render dispatcher ────────────────────────────────────────────────────────

function render() {
  if (currentView === 'overview') renderOverview();
  else if (currentView === 'compare') renderCompare();
  else renderDetail();
}

// ── Overview cards ────────────────────────────────────────────────────────────

function renderOverview() {
  const container = document.getElementById('overview');
  container.innerHTML = '';

  SERVERS.forEach(host => {
    const d = currentData[host];
    const card = document.createElement('div');
    card.className = 'server-card';

    if (!d) {
      card.innerHTML = `<div class="card-header"><h3>${host}</h3><span class="badge badge-loading">Pending</span></div>`;
      container.appendChild(card);
      return;
    }

    const isOk = d.status === 'ok';
    const p = d.parsed || {};
    const drives = p.drives || [];
    const ctrl = p.controller_info || {};

    const ctrlRows = ['Model','Serial Number','Controller Status','Device Interface','Firmware Package Build','Firmware Version','Operating system'].map(k =>
      ctrl[k] ? `<tr><td>${k}</td><td>${ctrl[k]}</td></tr>` : ''
    ).join('');

    const driveRows = drives.map(dr => {
      const state = dr['State'] || '?';
      const media = dr['Med'] || '';
      const size  = dr['Size'] || '';
      const intf  = dr['Intf'] || '';
      const speed = ctrl['Device Interface'] ? ctrl['Device Interface'].replace(/^[A-Za-z]+-?/,'') : '';
      const model = dr['Model'] || '';
      const color = (state === 'Onln' || state === 'UGood') ? 'var(--green)' :
                    (state === 'Offln' || state === 'Msng') ? 'var(--red)' : 'var(--yellow)';
      return `<div class="drive-row">
        <span>${dr.id || '?'}</span>
        <span>${intf}${speed ? '-'+speed : ''} ${media}</span>
        <span>${size}</span>
        <span style="color:${color};font-weight:600">${state}</span>
        <span style="color:var(--muted)">${model}</span>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-header">
        <h3>${host}</h3>
        <span class="badge ${isOk ? 'badge-ok' : 'badge-err'}">${isOk ? 'Online' : 'Error'}</span>
      </div>
      ${!isOk ? `<div class="err-msg">${escHtml(d.error)}</div>` : ''}
      ${ctrlRows ? `<table>${ctrlRows}</table>` : ''}
      ${driveRows ? `<div class="drive-list">${driveRows}</div>` : (isOk ? '<div class="err-msg" style="color:var(--muted)">No drives parsed</div>' : '')}
    `;
    container.appendChild(card);
  });
}

// ── Compare table ─────────────────────────────────────────────────────────────

function compareTable(title, rows) {
  // rows: [{label, vals:[{server,value}]}]
  // vals is array of strings, one per SERVERS entry
  if (!rows.length) return '';
  let html = `<div class="section-header">${title}</div>`;
  html += `<div style="overflow-x:auto"><table class="compare-table"><thead><tr><th>Field</th>`;
  SERVERS.forEach(h => { html += `<th>${escHtml(h)}</th>`; });
  html += `</tr></thead><tbody>`;
  rows.forEach(({label, vals}) => {
    const defined = vals.filter(v => v !== '—');
    const allSame = defined.length > 1 && defined.every(v => v === defined[0]);
    html += `<tr><td class="row-label">${escHtml(label)}</td>`;
    vals.forEach(v => {
      html += `<td class="${!allSame && v !== '—' ? 'diff' : ''}">${escHtml(v)}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function renderCompare() {
  const container = document.getElementById('compare');

  if (!Object.keys(currentData).length) {
    container.innerHTML = '<p style="color:var(--muted);padding:20px">No data yet — click Refresh All first.</p>';
    return;
  }

  let html = '';

  // ── 1. Controller summary ──────────────────────────────────────────────────
  const ctrlFields = ['Model','Device Interface','Controller Status',
                      'Firmware Package Build','Firmware Version','Operating system','Serial Number'];
  html += compareTable('Controller', ctrlFields.map(f => ({
    label: f,
    vals: SERVERS.map(h => currentData[h]?.parsed?.controller_info?.[f] ?? '—')
  })));

  // ── 2. RAID (VD) summary ───────────────────────────────────────────────────
  const vdFields = ['DG/VD','TYPE','State','Size','Access','Cache','Name'];
  const vdRows = vdFields.map(f => ({
    label: f,
    vals: SERVERS.map(h => {
      const vds = currentData[h]?.parsed?.vdrives || [];
      return vds.length ? vds.map(v => v[f] || '—').join(' / ') : '—';
    })
  }));
  html += compareTable('RAID / Virtual Drives', vdRows);

  // ── 3. Drive count & state summary ────────────────────────────────────────
  const stateRows = [
    { label: 'Total drives', vals: SERVERS.map(h => String((currentData[h]?.parsed?.drives||[]).length) || '0') },
    { label: 'Online',  vals: SERVERS.map(h => String((currentData[h]?.parsed?.drives||[]).filter(d=>d.State==='Onln').length))  },
    { label: 'Offline', vals: SERVERS.map(h => String((currentData[h]?.parsed?.drives||[]).filter(d=>d.State==='Offln').length)) },
    { label: 'Other',   vals: SERVERS.map(h => String((currentData[h]?.parsed?.drives||[]).filter(d=>d.State!=='Onln'&&d.State!=='Offln').length)) },
    { label: 'HDD',  vals: SERVERS.map(h => String((currentData[h]?.parsed?.drives||[]).filter(d=>d.Med==='HDD').length)) },
    { label: 'SSD',  vals: SERVERS.map(h => String((currentData[h]?.parsed?.drives||[]).filter(d=>d.Med==='SSD').length)) },
  ];
  html += compareTable('Drive Summary', stateRows);

  // ── 4. Drive-by-drive comparison (single table, rows=drives, cols=servers) ──
  const maxDrives = Math.max(...SERVERS.map(h => (currentData[h]?.parsed?.drives||[]).length));
  if (maxDrives > 0) {
    const driveCompFields = ['State','Size','Med','Intf','Model','DG','SeSz'];
    html += `<div class="section-header">Drive-by-Drive Comparison</div>`;
    html += `<div style="overflow-x:auto"><table class="compare-table"><thead><tr>`;
    html += `<th>#</th>`;
    SERVERS.forEach(h => {
      html += `<th colspan="${driveCompFields.length}" style="text-align:center;border-left:2px solid var(--accent)">${escHtml(h)}</th>`;
    });
    html += `</tr><tr><th></th>`;
    SERVERS.forEach(() => {
      driveCompFields.forEach(f => { html += `<th style="font-size:11px;color:var(--muted)">${escHtml(f)}</th>`; });
    });
    html += `</tr></thead><tbody>`;
    for (let i = 0; i < maxDrives; i++) {
      html += `<tr><td class="row-label">${i+1}</td>`;
      SERVERS.forEach((h, si) => {
        const dr = (currentData[h]?.parsed?.drives||[])[i];
        const borderStyle = si === 0 ? '' : 'border-left:2px solid var(--border)';
        driveCompFields.forEach((f, fi) => {
          const val = dr ? (dr[f] ?? '—') : '—';
          const style = (fi === 0 ? borderStyle : '');
          // Highlight state differences
          let extra = '';
          if (f === 'State' && (val === 'Onln' || val === 'UGood')) extra = 'color:var(--green)';
          else if (f === 'State' && (val === 'Offln' || val === 'Msng')) extra = 'color:var(--red);font-weight:600';
          else if (f === 'State' && val !== '—') extra = 'color:var(--yellow);font-weight:600';
          html += `<td style="${style}${extra ? ';'+extra : ''}">${escHtml(val)}</td>`;
        });
      });
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
  }

  container.innerHTML = html;
}

// ── Detail view ───────────────────────────────────────────────────────────────

function renderDetail() {
  const container = document.getElementById('detail');
  let html = '';

  SERVERS.forEach(host => {
    const d = currentData[host];
    if (!d) return;

    html += `<div class="section-header">${host}</div>`;
    if (d.status !== 'ok') {
      html += `<p style="color:var(--red);margin-bottom:12px">${escHtml(d.error)}</p>`;
      return;
    }

    const drives = d.parsed?.drives || [];
    if (!drives.length) {
      html += `<p style="color:var(--muted);margin-bottom:12px">No drives parsed.</p>`;
      return;
    }

    html += `<div class="detail-grid">`;
    drives.forEach(dr => {
      const rows = Object.entries(dr)
        .filter(([k]) => k !== 'id')
        .map(([k,v]) => `<tr><td>${escHtml(k)}</td><td>${escHtml(v)}</td></tr>`)
        .join('');
      html += `<div class="detail-card"><h4>${escHtml(dr.id || '?')}</h4><table>${rows}</table></div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html || '<p style="color:var(--muted);padding:20px">No data. Click Refresh All first.</p>';
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-load on page open, then refresh every 60 seconds
loadData();
setInterval(loadData, 60000);

// Countdown to next refresh
let countdown = 60;
setInterval(() => {
  countdown--;
  if (countdown <= 0) countdown = 60;
  const el = document.getElementById('status');
  if (!el.innerHTML.includes('spinner')) {
    el.textContent = el.textContent.replace(/ \(next refresh.*\)/, '') + ` (next refresh in ${countdown}s)`;
  }
}, 1000);
</script>
</body>
</html>
